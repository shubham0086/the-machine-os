<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 600px; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }

  .canvas {
    width: 1200px; height: 600px; position: relative; overflow: hidden;
    background:
      radial-gradient(ellipse 700px 480px at 80% 28%, rgba(99,102,241,0.22) 0%, transparent 70%),
      radial-gradient(ellipse 560px 380px at 18% 92%, rgba(16,185,129,0.13) 0%, transparent 70%),
      #0a0f1e;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(125,184,247,0.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(125,184,247,0.045) 1px, transparent 1px);
    background-size: 54px 54px;
    -webkit-mask-image: radial-gradient(ellipse 900px 560px at 50% 45%, #000 28%, transparent 80%);
    mask-image: radial-gradient(ellipse 900px 560px at 50% 45%, #000 28%, transparent 80%);
  }
  .node { position: absolute; border-radius: 50%; background: #818cf8; box-shadow: 0 0 14px rgba(129,140,248,0.85); }
  .n1 { width: 10px; height: 10px; top: 92px; left: 140px; opacity: .55; }
  .n2 { width: 7px; height: 7px; top: 130px; right: 160px; opacity: .4; }
  .n3 { width: 6px; height: 6px; bottom: 120px; left: 220px; opacity: .35; }
  .n4 { width: 9px; height: 9px; bottom: 140px; right: 130px; background:#10b981; box-shadow:0 0 14px rgba(16,185,129,.8); opacity: .5; }

  .inner { position: relative; z-index: 2; padding: 0 80px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px; padding: 7px 18px;
    border: 1px solid rgba(129,140,248,0.32); border-radius: 100px; background: rgba(129,140,248,0.07);
    margin-bottom: 26px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #818cf8; box-shadow: 0 0 10px #818cf8; }
  .eyebrow-text { font-size: 12px; font-weight: 700; color: #a5b4fc; letter-spacing: 3px; text-transform: uppercase; }

  .title { font-size: 82px; font-weight: 800; color: #fff; line-height: 1; letter-spacing: -2px; margin-bottom: 22px; }
  .title .grad {
    background: linear-gradient(100deg, #818cf8 0%, #38bdf8 55%, #10b981 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .sub { font-size: 21px; color: rgba(255,255,255,0.66); font-weight: 500; line-height: 1.5; max-width: 820px; margin: 0 auto 34px; }

  .ladder { display: flex; align-items: center; justify-content: center; gap: 0; }
  .step { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.8); padding: 9px 16px; border: 1px solid rgba(129,140,248,0.22); background: rgba(255,255,255,0.03); }
  .step:first-child { border-radius: 8px 0 0 8px; }
  .step:last-child { border-radius: 0 8px 8px 0; color: #10b981; border-color: rgba(16,185,129,0.4); }
  .arrow { color: #6366f1; font-size: 14px; padding: 0 9px; }

  .accent { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 380px; height: 4px; background: linear-gradient(90deg, transparent, #818cf8, #10b981, transparent); border-radius: 0 0 4px 4px; }
</style>
</head>
<body>
<div class="canvas">
  <div class="grid"></div>
  <div class="accent"></div>
  <div class="node n1"></div><div class="node n2"></div><div class="node n3"></div><div class="node n4"></div>
  <div class="inner">
    <div class="eyebrow"><span class="dot"></span><span class="eyebrow-text">Agent Systems Engineering</span></div>
    <div class="title">The <span class="grad">Machine OS</span></div>
    <div class="sub">From first principles to a shippable multi-agent SaaS. 16 open-source repos, extracted from production, run each in a minute.</div>
    <div class="ladder">
      <span class="step">learn</span><span class="arrow">&rarr;</span>
      <span class="step">solve</span><span class="arrow">&rarr;</span>
      <span class="step">integrate</span><span class="arrow">&rarr;</span>
      <span class="step">ship</span>
    </div>
  </div>
</div>
</body>
</html>
